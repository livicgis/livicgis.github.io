<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project Gantt Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #fff;
        }
        #chart_div {
            width: 100%;
            height: 100vh;
        }
        #message {
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="message"></div>
    <div id="chart_div"></div>

    <script>
        // =========================================
        // Config
        // =========================================

        const PORTAL_URL  = "https://www.arcgis.com";
        const ITEM_ID     = "2f22aeea2773404c805a4dbbd5f6928b";
        const FEATURE_URL = `https://services9.arcgis.com/s1AaOBMRat2Zd1Tj/arcgis/rest/services/PADCP_SiteInventory_BETA/FeatureServer`;

        // Table indexes
        const TABLES = [
            {
                label:      "On the Board",
                index:      5,
                startField: "OB_StartDate",
                endField:   "OB_EndDate",
                targetField:"OB_TargetEndDate",
                keyField:   "DA_Key",
                pctFields:  ["OB_Water","OB_Energy","OB_Utility"]
            },
            {
                label:      "Power Study",
                index:      6,
                startField: "PS_StartDate",
                endField:   "PS_EndDate",
                targetField:"PS_TargetEndDate",
                keyField:   "DA_Key",
                pctFields:  ["PS_Transmission","PS_GasAvailability","PS_FutureContracts"]
            },
            {
                label:      "Due Diligence",
                index:      7,
                startField: "DD_StartDate",
                endField:   "DD_EndDate",
                targetField:"DD_TargetEndDate",
                keyField:   "DA_Key",
                pctFields:  ["DD_Zoning","DD_Traffic","DD_UTL_Water"]
            },
            {
                label:      "Deck Review",
                index:      9,
                startField: "CD_StartDate",
                endField:   "CD_EndDate",
                targetField:"CD_TargetEndDate",
                keyField:   "DA_Key",
                pctFields:  ["CD_ParcelSummary","CD_EntitlementSummary","CD_UtilitySummary"]
            },
            {
                label:      "Entitlement",
                index:      11,
                startField: "E_StartDate",
                endField:   "E_EndDate",
                targetField:"E_TargetEndDate",
                keyField:   "DA_Key",
                pctFields:  ["E_Zoning","E_DesignReview","E_Planning"]
            }
        ];

        // =========================================
        // Get selected site key from URL parameter
        // =========================================

        function getParam(name) {
            const url    = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        const selectedKey = getParam("key");

        if (!selectedKey) {
            document.getElementById("message").innerText = "No site selected.";
        } else {
            loadAndDraw(selectedKey);
        }

        // =========================================
        // Fetch a single table row for the selected
        // site from the ArcGIS REST API
        // =========================================

        async function fetchTableRow(table, key) {
            const fields = [
                table.startField,
                table.endField,
                table.targetField,
                ...table.pctFields
            ].join(",");

            const url = `${FEATURE_URL}/${table.index}/query?` + new URLSearchParams({
                where:       `${table.keyField} = '${key}'`,
                outFields:   fields,
                returnGeometry: false,
                f:           "json"
            });

            const res  = await fetch(url);
            const data = await res.json();

            if (data.features && data.features.length > 0) {
                return data.features[0].attributes;
            }
            return null;
        }

        // =========================================
        // Calculate percent complete from fields
        // Excludes null and N/A (-1)
        // =========================================

        function calcPercent(attrs, fields) {
            let sum = 0, count = 0;
            for (const f of fields) {
                const v = attrs[f];
                if (v !== null && v !== undefined && v !== -1) {
                    sum += v;
                    count++;
                }
            }
            return count === 0 ? 0 : Math.round(sum / count);
        }

        // =========================================
        // Load all tables and draw Gantt
        // =========================================

        google.charts.load("current", { packages: ["gantt"] });

        async function loadAndDraw(key) {
            const rows = [];

            for (const table of TABLES) {
                const attrs = await fetchTableRow(table, key);

                if (!attrs) { continue; }

                const start  = attrs[table.startField]  ? new Date(attrs[table.startField])  : null;
                const end    = attrs[table.endField]     ? new Date(attrs[table.endField])     : null;
                const target = attrs[table.targetField]  ? new Date(attrs[table.targetField])  : null;
                const pct    = calcPercent(attrs, table.pctFields);

                // Skip rows with no dates
                if (!start || !end) { continue; }

                // Actual bar
                rows.push([
                    table.label + "_actual",
                    table.label,
                    null,           // resource
                    start,
                    end,
                    null,           // duration
                    pct,            // percent complete
                    null            // dependencies
                ]);

                // Target end bar (if exists and differs from end)
                if (target) {
                    rows.push([
                        table.label + "_target",
                        table.label + " (Target)",
                        null,
                        start,
                        target,
                        null,
                        0,
                        null
                    ]);
                }
            }

            if (rows.length === 0) {
                document.getElementById("message").innerText = "No schedule data available for this site.";
                return;
            }

            google.charts.setOnLoadCallback(() => drawChart(rows));
        }

        // =========================================
        // Draw the Google Gantt chart
        // =========================================

        function drawChart(rows) {
            const data = new google.visualization.DataTable();
            data.addColumn("string", "Task ID");
            data.addColumn("string", "Task Name");
            data.addColumn("string", "Resource");
            data.addColumn("date",   "Start Date");
            data.addColumn("date",   "End Date");
            data.addColumn("number", "Duration");
            data.addColumn("number", "Percent Complete");
            data.addColumn("string", "Dependencies");

            data.addRows(rows);

            const options = {
                height:          400,
                gantt: {
                    trackHeight:         30,
                    barHeight:           20,
                    criticalPathEnabled: false,
                    percentEnabled:      true,
                    palette: [
                        { color: "#1a73e8", dark: "#1558b0", light: "#d2e3fc" }, // actual
                        { color: "#fbbc04", dark: "#f29900", light: "#feefc3" }  // target
                    ]
                }
            };

            const chart = new google.visualization.Gantt(
                document.getElementById("chart_div")
            );
            chart.draw(data, options);
        }
    </script>
</body>
</html>
